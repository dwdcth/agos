name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform.target }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: agent-memos
            use-zig: true
            features: "chinese-tokenizer"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: agent-memos
            use-zig: true
            features: "chinese-tokenizer"
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            bin: agent-memos
            use-zig: false # LoongArch using cross is more reliable
            features: "" 
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: agent-memos
            use-zig: false
            features: "chinese-tokenizer"
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: agent-memos
            use-zig: false
            features: "chinese-tokenizer"
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: agent-memos.exe
            use-zig: false
            features: ""
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bin: agent-memos.exe
            use-zig: false
            features: ""

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Zig
        if: matrix.platform.use-zig == true
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.platform.use-zig == true
        run: cargo install cargo-zigbuild

      - name: Build (Zig)
        if: matrix.platform.use-zig == true
        run: cargo zigbuild --release --target ${{ matrix.platform.target }} --features "${{ matrix.platform.features }}"

      - name: Build (Native)
        if: matrix.platform.use-zig == false && matrix.platform.os != 'ubuntu-latest'
        shell: bash
        run: |
          if [ -n "${{ matrix.platform.features }}" ]; then
            cargo build --release --target ${{ matrix.platform.target }} --features "${{ matrix.platform.features }}"
          else
            cargo build --release --target ${{ matrix.platform.target }}
          fi

      - name: Build (Cross for LoongArch)
        if: matrix.platform.use-zig == false && matrix.platform.os == 'ubuntu-latest'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross.git
          cross build --release --target ${{ matrix.platform.target }}

      - name: Package
        shell: bash
        run: |
          BIN_NAME="${{ matrix.platform.bin }}"
          TARGET_DIR="target/${{ matrix.platform.target }}/release"
          PKG_NAME="agent-memos-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz"
          
          # For cross, the binary might be in a different place depending on how cross is configured, 
          # but usually it mirrors target/
          cd "$TARGET_DIR"
          tar -czf "../../../$PKG_NAME" "$BIN_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.target }}
          path: agent-memos-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
