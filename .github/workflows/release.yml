name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform.target }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: agent-memos
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bin: agent-memos
          - os: ubuntu-latest
            target: loongarch64-unknown-linux-gnu
            bin: agent-memos
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: agent-memos
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: agent-memos
          # Windows (Cross-compiled from Linux using Zig to support libsimple)
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            bin: agent-memos.exe
          - os: ubuntu-latest
            target: aarch64-pc-windows-gnullvm
            bin: agent-memos.exe

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build
        # Enable chinese-tokenizer for all platforms since Zig makes it possible
        run: cargo zigbuild --release --target ${{ matrix.platform.target }} --features "chinese-tokenizer"

      - name: Package
        shell: bash
        run: |
          BIN_NAME="${{ matrix.platform.bin }}"
          TARGET_DIR="target/${{ matrix.platform.target }}/release"
          PKG_NAME="agent-memos-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz"
          
          cd "$TARGET_DIR"
          tar -czf "../../../$PKG_NAME" "$BIN_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.target }}
          path: agent-memos-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
